<div>

<option>+1</option>
<option>+44</option>
<option>+971</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
<div class="flex-1">
<input class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 text-text-dark placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="00000 00000" type="tel"/>

</div>
</div>

                        Get OTP
                    </button>
