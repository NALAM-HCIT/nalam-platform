# Legacy file — backend now hosted on Railway
# See: https://nalam-api-production.up.railway.app
services:
  - type: web
    name: nalam-api
    env: docker
    rootDir: NalamApi
    plan: free
    region: ohio
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        sync: false # User must set in Railway dashboard
      - key: PORT
        value: 5000
